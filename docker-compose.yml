# Local dev stack — fully self-hosted, no cloud accounts needed.
#
# Services:
#   mongo          MongoDB 7  (port 27017)
#   mongo-express  Admin UI  (http://localhost:8081)
#   minio          S3-compatible object storage (replaces Cloudinary)
#                  S3 API: http://localhost:9000   Web UI: http://localhost:9001
#   minio-init     One-shot job — creates the bucket and sets it public-readable
#   mailpit        SMTP catcher (replaces Resend)
#                  SMTP: localhost:1025    Web inbox: http://localhost:8025
#
# Start:  docker compose up -d
# Stop:   docker compose down
# Reset:  docker compose down -v   (also wipes volumes)

services:
  mongo:
    image: mongo:7
    container_name: sync-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: sync
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-express:
    image: mongo-express:1.0
    container_name: sync-mongo-express
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongo:27017/
      ME_CONFIG_BASICAUTH: "false"

  minio:
    image: minio/minio:RELEASE.2024-10-29T16-01-48Z
    container_name: sync-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console (user/pass: minioadmin / minioadmin)
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot job: creates the bucket and exposes it for in-browser file URLs.
  # Without this, Cloudinary's "public secure_url" pattern wouldn't have an equivalent
  # in MinIO; here we bake the access policy at boot.
  minio-init:
    image: minio/mc:RELEASE.2024-10-29T15-34-59Z
    container_name: sync-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/sync &&
      mc anonymous set download local/sync &&
      echo '✔ MinIO bucket sync ready'
      "

  mailpit:
    image: axllent/mailpit:v1.20
    container_name: sync-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web inbox
    environment:
      MP_MAX_MESSAGES: 5000
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

volumes:
  mongo-data:
  minio-data:
